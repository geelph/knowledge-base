# =============================================================================
# Android 构建工作流（移动端 T-M020）
# =============================================================================
#
# 触发方式：
#   - workflow_dispatch（手动触发；可选 debug / release）
#   - 推送 v*.*.*-mobile.* 格式的 Tag（与桌面 v*.*.* 区分，避免桌面构建 +
#     Android 构建相互打架）
#
# 构建类型：
#   - debug：SDK 自带 debug keystore 自签名，可直接侧载（默认）
#   - release：用 kb-release.jks 正式签名（需仓库配好 ANDROID_* + TAURI_SIGNING_* Secrets）
#       同时出 APK（侧载 / 配合 App 内"检查更新"）和 AAB（传 Google Play）
#
# release 构建需要的 GitHub Secrets（主 bkywksj 仓库 + 备用 allebamala 仓库都已配）：
#   - ANDROID_KEYSTORE_BASE64        base64(kb-release.jks 文件内容)
#   - ANDROID_KEYSTORE_PASSWORD      keystore 密码
#   - ANDROID_KEY_ALIAS              key alias（kb）
#   - ANDROID_KEY_PASSWORD           key 密码
#   - TAURI_SIGNING_PRIVATE_KEY      tauri updater 私钥（src-tauri/keys/tauri-updater.key 内容）
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  （空）
#
# 产物：
#   - app-aarch64-debug.apk / app-aarch64-release.apk（仅 ARM64 主流真机）
#   - app-*-release.aab（release 构建才有）
#
# 上传到：
#   - GitHub Actions Artifacts（30 天后自动清理）
#   - tag 触发时附加到 GitHub Release（草稿）
#   - 后续可加上传到 release 仓库 / R2，并往 update.json 加 android-arm64 字段
# =============================================================================

name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型（debug 自签名 / release 需要 keystore）'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*.*.*-mobile.*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Set NDK env vars
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # Android target 单独 key，避免与桌面构建缓存互冲
          key: 'android-${{ matrix.target || ''aarch64'' }}'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Tauri Android build (debug)
        if: github.event.inputs.build_type != 'release'
        run: pnpm exec tauri android build --apk --debug --target aarch64

      # release：先从 Secrets 还原 keystore + key.properties（gitignored，仓库里没有），
      # build.gradle.kts 的 signingConfigs.release 会读 key.properties 自动签名
      - name: Restore Android release keystore
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/kb-release.jks
          cat > src-tauri/gen/android/key.properties <<EOF
          storeFile=../kb-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Tauri Android build (release, signed APK + AAB)
        if: github.event.inputs.build_type == 'release'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri android build --apk --aab --target aarch64

      - name: List build outputs
        run: find src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-base-android-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          # debug 只产 apk，没有 aab，所以 warn 而非 error（避免 debug 构建因缺 aab 失败）
          if-no-files-found: warn
          retention-days: 30

      # 仅在 tag 触发时附加到 GitHub Release（草稿）
      - name: Attach to Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
